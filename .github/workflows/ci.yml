name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (pre-commit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Cache pre-commit
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit on all files
        run: pre-commit run --all-files --show-diff-on-failure
        # NOTA: pode falhar em codigo legado primeiro run.
        # Owner pode rodar `pre-commit run --all-files` local + commit
        # do fix-up baseline antes de habilitar.
        continue-on-error: true

  # test job adiado pra T-CI-2:
  # tests/ atual tem imports v0.5 broken + dependencias Z:/tcf-data SQLite
  # + fixtures missing. Refactor necessario antes de CI rodar pytest.
