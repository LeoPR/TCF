name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (pre-commit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Cache pre-commit
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit on all files
        run: pre-commit run --all-files --show-diff-on-failure
        # NOTA: pode falhar em codigo legado primeiro run.
        # Owner pode rodar `pre-commit run --all-files` local + commit
        # do fix-up baseline antes de habilitar.
        continue-on-error: true

  test:
    name: Tests (py ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    env:
      # ADR-0017 #2: determinismo reproducivel pro byte-canonical
      # (D1-D9 1523B, D17a 322B INVARIANT). Settado no ambiente do job
      # ANTES do interpretador iniciar (conftest setdefault e best-effort
      # mas hash seed so' aplica no startup).
      PYTHONHASHSEED: '0'
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install package + dev deps
        run: pip install -e ".[dev]"

      - name: Regression gate (byte-canonical v1.0 — ADR-0017 #8)
        # Gate BLOQUEANTE: se D1-D9 1523B ou D17a 322B INVARIANT mudarem,
        # ou se a superficie de API publica divergir, o merge falha.
        # Bypass exige ADR novo + snapshot updated + version bump.
        run: pytest tests/test_regression_v1_baseline.py -v --tb=short

      - name: Run tests (skip requires_data)
        run: pytest tests/ -m "not requires_data" -v --tb=short
        # NOTA (T-CI-2 2026-05-23):
        # - tests v0.5 broken movidos pra tests/_archive_v05/ (norecursedirs)
        # - tests/test_shaper.py marker requires_data (precisa SQLite Z:/tcf-data)
        # - tests/test_core_rt.py: 31 RT tests sem deps externos (CI-friendly)
