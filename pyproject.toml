[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tcf"
version = "0.1.0"
description = "Textual Columnar Format — compact relational data encoding for LLMs"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
keywords = ["llm", "columnar", "encoding", "data", "compression"]
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=7"]
eval = ["requests>=2.28"]  # for Ollama client (experiments only)

[project.scripts]
tcf = "tcf.cli:main"

[tool.hatchling.build.targets.wheel]
packages = ["src/tcf"]

# Future: C extension would be added here via hatchling-meson or setuptools
# Future: Rust extension via maturin (replaces hatchling, same src/ layout)
