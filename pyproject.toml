[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tcf"
version = "0.2.0"
description = "TCF (Tabular Compact Format) — string compression via OBAT (Online Bidirectional Affix Tokenizer) + HCC (Hierarchical Compositional Coding)"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
keywords = ["tabular", "compression", "encoding", "affix-tokenizer", "compositional-coding", "string-compression"]
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=7"]
eval = ["requests>=2.28"]  # for Ollama client (experiments only)

# Datasets tools — for downloading and processing canonical benchmarks
# Install with: pip install -e ".[datasets]"
datasets = [
    "duckdb>=1.0",        # TPC-H generation via tpch extension
    "scikit-learn>=1.3",  # fetch_openml for UCI datasets (Adult, etc)
    "pandas>=2.0",        # DataFrame manipulation
]

# Convenience meta-group: install everything
all = [
    "tcf[dev,eval,datasets]",
]

[tool.pytest.ini_options]
cache_dir = "Z:\\caches\\pytest"

[project.scripts]
tcf = "tcf.cli:main"

[tool.hatchling.build.targets.wheel]
packages = ["old/tcf"]

# Nota (2026-05-17): src/tcf/ moved to old/tcf/ para sinalizar que e'
# v0.5 (columnar/RLE para LLM benchmark — acessorio). Codigo canonico
# atual e' o algoritmo TCF-CORE em experiments/lab/dirty/. Quando
# protótipo migrar, novo modulo nascera em src/.
# Future: C extension would be added here via hatchling-meson or setuptools
# Future: Rust extension via maturin (replaces hatchling, same src/ layout)
